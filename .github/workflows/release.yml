name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            label: macos-arm64
          - os: macos-13
            label: macos-x64
          - os: ubuntu-latest
            label: linux-x64
    runs-on: ${{ matrix.os }}
    name: build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Rename binary
        run: mv linepaste linepaste-${{ matrix.label }}

      - uses: actions/upload-artifact@v4
        with:
          name: linepaste-${{ matrix.label }}
          path: linepaste-${{ matrix.label }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: linepaste-*
